{{- if .Values.mysql.pvc.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.mysql.pvc.storageClass }}
  resources:
    requests:
      storage: {{ .Values.mysql.pvc.storageSize }}
{{- end }}
