apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
    spec:
      containers:
      - name: {{ .Values.backend.name }}
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.port }}
        env:
        - name: DB_HOST
          value: {{ .Values.backend.env.DB_HOST }}
        - name: DB_PORT
          value: "{{ .Values.backend.env.DB_PORT }}"
        {{- if .Values.backend.env.DB_NAME }}
        - name: DB_NAME
          value: {{ .Values.backend.env.DB_NAME }}
        {{- end }}
        {{- if .Values.backend.env.configMapRef }}
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.backend.env.configMapRef.name }}
              key: {{ .Values.backend.env.configMapRef.key }}
        {{- end }}
        {{- if .Values.backend.env.secretRef }}
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.backend.env.secretRef.name }}
              key: {{ .Values.backend.env.secretRef.userKey }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.backend.env.secretRef.name }}
              key: {{ .Values.backend.env.secretRef.passwordKey }}
        {{- if .Values.backend.env.secretRef.jwtKey }}
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.backend.env.secretRef.name }}
              key: {{ .Values.backend.env.secretRef.jwtKey }}
        {{- end }}
        {{- end }}
        - name: PORT
          value: "{{ .Values.backend.port }}"
        resources:
          requests:
            cpu: {{ .Values.backend.resources.requests.cpu }}
            memory: {{ .Values.backend.resources.requests.memory }}
          limits:
            cpu: {{ .Values.backend.resources.limits.cpu }}
            memory: {{ .Values.backend.resources.limits.memory }}
